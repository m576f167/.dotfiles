# Tmux layout - equivalent to .screen_layout
# Sourced by .tmux.conf on new sessions

# Default windows
new-window -t :2 -n "Editor"
new-window -t :3 -n "Monitor"
new-window -t :4 -n "Console"

# IDE layout in Editor window:
#   Left (Editor) | Right-top (Monitor)
#                 | Right-bottom (Console)
select-window -t :2
split-window -h
split-window -v
resize-pane -t 2 -x 52
resize-pane -t 3 -y 17
select-pane -t 1

# Start in Terminal window
select-window -t :1
