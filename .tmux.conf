# 256 colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm*:Tc"

# Enable mouse
set -g mouse on

# Copy to system clipboard
set -s copy-command "pbcopy"

# Prefix key is Ctrl-b (tmux default, matches screen config)
# unbind default and rebind for clarity
set -g prefix C-b
bind C-b send-prefix

# Remap break: prefix + b sends break signal
bind b send-keys "" \; display-message "Break sent"

# Disable startup message (tmux has no startup message, but silence other messages)
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none

# Huge scrollback buffer
set -g history-limit 500000

# Navigate between panes using Ctrl-Arrow keys
bind -n C-Right select-pane -R
bind -n C-Left select-pane -L
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Change window using Ctrl-Shift-Left/Right
bind -n C-S-Right next-window
bind -n C-S-Left previous-window

# Go to copy mode using Ctrl-Shift-Up/Down
bind -n C-S-Up copy-mode
bind -n C-S-Down copy-mode

# Split panes: | for vertical, - for horizontal
bind | split-window -h
bind - split-window -v

# Change to next/previous window layout (equivalent to screen's layout switching)
bind -n C-S-F3 next-layout
bind -n C-S-F2 previous-layout

# Prefix + r enters resize mode using a custom key table
bind r switch-client -T resize

# Use hjkl keys to resize panes in resize mode (stays in resize mode for repeated use)
bind -T resize h resize-pane -L 1 \; switch-client -T resize
bind -T resize j resize-pane -D 1 \; switch-client -T resize
bind -T resize k resize-pane -U 1 \; switch-client -T resize
bind -T resize l resize-pane -R 1 \; switch-client -T resize

# Navigate between panes while in resize mode
bind -T resize Tab select-pane -t :.+ \; switch-client -T resize
bind -T resize Left select-pane -L \; switch-client -T resize
bind -T resize Right select-pane -R \; switch-client -T resize
bind -T resize Up select-pane -U \; switch-client -T resize
bind -T resize Down select-pane -D \; switch-client -T resize

# Any other key exits resize mode (Escape explicitly)
bind -T resize Escape switch-client -T root

# Status line (equivalent to screen's hardstatus)
set -g status on
set -g status-interval 1
set -g status-style "bg=black,fg=green"

# Left: [hostname]
set -g status-left-length 30
set -g status-left "#[fg=green][#[fg=brightgreen]#H#[fg=green]]"

# Center: window list with current window highlighted
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=yellow,bg=black,bold] #I*#W "
set -g window-status-separator ""
set -g status-justify centre

# Right: [Day Date Month | Time AM/PM]
set -g status-right-length 40
set -g status-right "#[fg=green][#[fg=blue]%a %d %b#[fg=green] | #[fg=white]%I:%M %p#[fg=green]]"

# Window and pane numbering starts at 1
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber windows
set -g renumber-windows on

# Layout autosave equivalent: aggressive resize
set -g aggressive-resize on

# Automatically load layout after session is created
set-hook -g session-created "source-file ~/.tmux_layout.conf"

# Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Continuum: auto-save and auto-restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize tpack (keep at the very bottom)
run 'tpack init'
